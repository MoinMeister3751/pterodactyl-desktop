name: Release

# Ausgelöst durch einen Tag-Push wie "v0.2.0". Baut den Windows-Installer
# (NSIS .exe + MSI), signiert die Update-Artefakte und veröffentlicht sie
# als GitHub Release inkl. latest.json, das der In-App-Updater abfragt.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Pterodactyl Desktop ${{ github.ref_name }}"
          releaseBody: "Siehe CHANGELOG.md für Details zu diesem Release."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
